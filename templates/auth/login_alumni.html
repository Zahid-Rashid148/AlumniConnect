{% extends 'base.html' %}
{% block title %}Alumni Login — AlumniConnect®{% endblock %}

{% block content %}
<div class="auth-page">
  <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 40% 80%,rgba(240,180,41,0.04) 0%,transparent 60%)"></div>

  <div class="auth-card">
    <div class="auth-logo">AlumniConnect®</div>
    <div class="auth-role-badge" style="background:var(--gold-soft);color:var(--gold);border-color:rgba(240,180,41,0.25)">
      <i class="bi bi-briefcase-fill"></i> Alumni Portal
    </div>
    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-subtitle">Sign in to manage mentees and share opportunities</p>

    <form method="post">
      {% csrf_token %}
      <div class="form-group-glass">
        <label class="form-label-glass">Username</label>
        <input type="text" name="username" class="form-control-glass" placeholder="your_username" autocomplete="username" required>
      </div>
      <div class="form-group-glass">
        <label class="form-label-glass">Password</label>
        <input type="password" name="password" class="form-control-glass" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-primary-glass w-100 justify-content-center mt-2" style="background:linear-gradient(135deg,var(--gold),#c8910a);color:#1a0e00">
        <i class="bi bi-arrow-right-circle"></i> Sign In as Alumni
      </button>
    </form>

    <div style="text-align:center;margin-top:1.5rem;font-size:.85rem;color:var(--text-muted)">
      Don't have an account?
      <a href="{% url 'register_alumni' %}" style="color:var(--gold);font-weight:600"> Register here</a>
    </div>

    <div style="text-align:center;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--glass-border)">
      <a href="{% url 'login_student' %}" style="font-size:.8rem;color:var(--text-dim)">← Student Login</a>
      &nbsp;·&nbsp;
      <a href="{% url 'login_admin' %}" style="font-size:.8rem;color:var(--text-dim)">Admin →</a>
    </div>
  </div>
</div>
{% endblock %}
