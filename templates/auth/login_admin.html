{% extends 'base.html' %}
{% block title %}Admin Login — AlumniConnect®{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">AlumniConnect®</div>
    <div class="auth-role-badge" style="background:rgba(255,77,109,0.08);color:var(--danger);border-color:rgba(255,77,109,0.2)">
      <i class="bi bi-shield-lock-fill"></i> Admin Portal
    </div>
    <h1 class="auth-title">Admin Access</h1>
    <p class="auth-subtitle">Restricted area — authorized personnel only</p>

    <form method="post">
      {% csrf_token %}
      <div class="form-group-glass">
        <label class="form-label-glass">Admin Username</label>
        <input type="text" name="username" class="form-control-glass" placeholder="admin_username" required>
      </div>
      <div class="form-group-glass">
        <label class="form-label-glass">Password</label>
        <div class="position-relative">
          <input type="password" name="password" id="admin_password" class="form-control-glass pe-5" placeholder="••••••••" required>
          <i class="bi bi-eye position-absolute top-50 end-0 translate-middle-y me-3 text-muted" onclick="togglePassword('admin_password', this)" style="cursor: pointer; z-index: 10;"></i>
        </div>
      </div>
      <button type="submit" class="btn-primary-glass w-100 justify-content-center mt-2">
        <i class="bi bi-shield-check"></i> Access Admin Panel
      </button>
    </form>

    <div style="text-align:center;margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--glass-border)">
      <a href="{% url 'login_student' %}" style="font-size:.8rem;color:var(--text-dim)">← Student Login</a>
      &nbsp;·&nbsp;
      <a href="{% url 'login_alumni' %}" style="font-size:.8rem;color:var(--text-dim)">← Alumni Login</a>
    </div>
  </div>
</div>
{% endblock %}
